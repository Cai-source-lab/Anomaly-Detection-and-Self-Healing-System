# 要监控的 Web 服务
web_services:
  - name: "超市管理系统"
    url: "http://localhost:8080/webAPP"
    timeout: 5
    expected_status: 200

# 要监控的端口
ports:
  - name: "Tomcat"
    port: 8080
  - name: "MySQL"
    port: 3306

# 要监控的进程
